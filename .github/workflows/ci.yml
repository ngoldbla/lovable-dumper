name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check connect.mjs
        run: node --check connect.mjs

      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8')); console.log('package.json: valid JSON')"
          node -e "const p = JSON.parse(require('fs').readFileSync('projects.json', 'utf8')); if (!Array.isArray(p)) { throw new Error('projects.json must be a JSON array'); } console.log('projects.json: valid JSON array')"
