name: release-please

# Maintains a rolling "release PR" from conventional commits. Merging that PR
# bumps package.json, updates CHANGELOG.md, and pushes the vX.Y.Z tag that
# triggers release.yml to build and upload installers.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # When a release was just created, build + publish installers in the SAME run.
  # We call release.yml directly (workflow_call) instead of relying on the pushed
  # tag, because a tag pushed by GITHUB_TOKEN does NOT trigger release.yml's
  # `on: push: tags` (GitHub's anti-recursion rule). No PAT required.
  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    secrets: inherit
